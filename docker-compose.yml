version: '3.8'

services:
  # Service 1: PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: carciscan_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-carciscan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dards} -d ${POSTGRES_DB:-carciscan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Service 2: FastAPI Application
  api:
    build: .
    container_name: carciscan_api
    ports:
      - "8000:8000"
    environment:
      # SQLALCHEMY DATABASE URL Format:
      # postgresql://<user>:<password>@<service_name>:<port>/<db_name>
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@carciscan_db:${DB_PORT:-5432}/${DB_NAME}
      DB_HOST: carciscan_db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT:-5432}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: