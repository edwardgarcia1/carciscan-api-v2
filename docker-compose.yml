services:
  # Service 1: PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: carciscan_db
    environment:
      POSTGRES_USER: ${DB_USER:-dards}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-carciscan}
    volumes:
      - postgres_data:/srv/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dards} -d ${DB_NAME:-carciscan}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Service 2: FastAPI Application
  api:
    build: .
    container_name: carciscan_api
    ports:
      - "55555:8000"
    environment:
      # SQLALCHEMY DATABASE URL Format:
      # postgresql://<user>:<password>@<service_name>:<port>/<db_name>
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@carciscan_db:${DB_PORT:-5432}/${DB_NAME}
      DB_HOST: carciscan_db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT:-54321}
      LLM_API_URL: ${LLM_API_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      MODEL_ID: ${MODEL_ID}
      FALLBACK_MODEL_IDS: ${FALLBACK_MODEL_IDS}
      WORKERS: ${WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
